name: Build Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build binary
        run: uv run python build.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: as-help-server-windows-x64
          path: dist/as-help-server.exe

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/as-help-server.exe#as-help-server-windows-x64.exe" --repo "${{ github.repository }}"
